name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: [self-hosted, linux]
    env:
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Go version
        run: go version

      - name: Build Linux binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -v \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/zfsnas-chezmoi .

      - name: Run tests
        run: go test ./...

      - name: Install cosign
        run: |
          curl -sSL -o /tmp/cosign \
            https://github.com/sigstore/cosign/releases/download/v2.4.3/cosign-linux-amd64
          chmod +x /tmp/cosign
          /tmp/cosign version

      - name: Sign release binary
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          # Write private key from secret to a temp file
          printf '%s' "${{ secrets.CODE_SIGN_PRIVATE_KEY }}" > /tmp/cosign.key

          # Sign the binary directly
          /tmp/cosign sign-blob \
            --key /tmp/cosign.key \
            --output-signature dist/zfsnas-chezmoi.sig \
            --tlog-upload=false \
            dist/zfsnas-chezmoi

          # Clean up private key immediately
          rm -f /tmp/cosign.key

          echo "=== Signature (base64) ==="
          cat dist/zfsnas-chezmoi.sig

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zfsnas-chezmoi
            dist/zfsnas-chezmoi.sig
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
