name: Build and Release

on:
  push:
    tags:
      - 'v*'           # Triggers on any tag like v1.0.0, v2.3.1, etc.

permissions:
  contents: write      # Required to create GitHub Releases

jobs:
  build-and-release:
    runs-on: [self-hosted, linux]   # Targets YOUR self-hosted runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'        # Adjust to your Go version

      - name: Build Linux binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -v \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/zfsnas-chezmoi ./...

      - name: Run tests
        run: go test ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/zfsnas-chezmoi
          generate_release_notes: true   # Auto-generates notes from commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

